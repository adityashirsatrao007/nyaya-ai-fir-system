version: "3.9"
services:
  backend:
    build: ./backend
    container_name: nyaya_backend
    env_file: ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend/static:/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped
