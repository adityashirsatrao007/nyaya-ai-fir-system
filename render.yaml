services:
  - type: web
    name: nyaya-api
    runtime: docker
    repo: https://github.com/adityashirsatrao007/nyaya-ai-fir-system
    plan: free
    dockerfilePath: ./backend/Dockerfile
    healthCheckPath: /health
    envVars:
      - key: ENV
        value: production
      - key: BACKEND_URL
        value: https://nyaya-api.onrender.com
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://nyaya-frontend-three.vercel.app,http://localhost:3000,http://localhost:5173
      - key: LOG_LEVEL
        value: INFO
